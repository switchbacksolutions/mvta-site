name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # TEST MODE key only (sk_test_...) — create-checkout.js makes a
          # real outbound call to Stripe's test-mode API. Never put a live
          # (sk_live_...) key in this secret.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          PUBLIC_SITE_URL: http://localhost:8888
          # STRIPE_WEBHOOK_SECRET / RESEND_API_KEY / TREASURER_EMAIL are
          # intentionally unset here — this suite doesn't run `stripe
          # listen`, so the webhook is never invoked and no email is ever
          # attempted. See tests/e2e/join.spec.ts for why.

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
